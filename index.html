<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Pancit</title>
  <style>
    /* --- CSS RESET & VARIABLES --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --primary-dark: #162506;   /* Deep Forest Green */
      --accent-dark: #466906;    /* Olive Green */
      --accent-light: #7C8E05;   /* Leaf Green */
      --gold: #D2BD44;           /* Warm Lemon Gold */
      --cream: #EFEAC5;          /* Soft Cream Background */
      --white: #ffffff;
      --text-muted: #555555;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: var(--primary-dark);
      background-color: var(--white);
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    /* --- NAVIGATION --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background-color: var(--white);
      border-bottom: 2px solid var(--cream);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-dark);
      font-family: 'Georgia', serif;
    }
    .nav-links {
      display: flex;
      gap: 30px;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--primary-dark);
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: var(--accent-light);
    }
    .nav-btn {
      background-color: var(--accent-dark);
      color: var(--white);
      padding: 12px 24px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: background-color 0.3s;
    }
    .nav-btn:hover {
      background-color: var(--accent-light);
    }

    /* --- HERO SECTION --- */
    header {
      background-color: var(--primary-dark);
      color: var(--white);
      padding: 100px 10%;
      text-align: center;
    }
    .badge {
      color: var(--gold);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 14px;
      display: inline-block;
      margin-bottom: 15px;
    }
    header h1 {
      font-size: 46px;
      margin-bottom: 20px;
      font-family: 'Georgia', serif;
      line-height: 1.2;
    }
    header p {
      font-size: 18px;
      max-width: 750px;
      margin: 0 auto 40px;
      color: var(--cream);
    }
    .hero-btns {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .btn-primary {
      background-color: var(--accent-light);
      color: var(--white);
      padding: 15px 32px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: opacity 0.3s;
    }
    .btn-secondary {
      background-color: transparent;
      color: var(--cream);
      padding: 15px 32px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      border: 2px solid var(--cream);
      transition: background-color 0.3s, color 0.3s;
    }
    .btn-primary:hover, .btn-secondary:hover {
      opacity: 0.9;
    }

    /* --- SERVICES SECTION --- */
    #services {
      padding: 80px 10%;
      text-align: center;
    }
    #services h2 {
      font-family: 'Georgia', serif;
      font-size: 36px;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }
    .card {
      background: var(--white);
      padding: 30px;
      border-radius: 8px;
      border: 1px solid var(--cream);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      text-align: left;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card h3 {
      font-family: 'Georgia', serif;
      color: var(--primary-dark);
      margin-bottom: 15px;
      font-size: 20px;
    }
    .card p {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* --- ANTI-AI MANIFESTO --- */
    .manifesto {
      background-color: var(--primary-dark);
      color: var(--white);
      padding: 60px 10%;
      text-align: center;
    }
    .manifesto-inner {
      max-width: 800px;
      margin: 0 auto;
      border: 2px solid var(--gold);
      padding: 40px;
      border-radius: 6px;
    }
    .manifesto h3 {
      font-family: 'Georgia', serif;
      color: var(--gold);
      font-size: 24px;
      margin-bottom: 15px;
    }

    /* --- TESTIMONIALS SECTION --- */
    #testimonials {
      padding: 80px 10%;
      text-align: center;
      background-color: var(--white);
    }
    #testimonials h2 {
      font-family: 'Georgia', serif;
      font-size: 36px;
      margin-bottom: 10px;
    }
    .sub-heading {
      color: var(--accent-dark);
      margin-bottom: 40px;
      font-size: 16px;
    }
    .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .testimonial-card {
      background-color: var(--white);
      border-left: 4px solid var(--accent-light);
      padding: 30px;
      border-radius: 4px;
      text-align: left;
      box-shadow: 0 4px 15px rgba(22, 37, 6, 0.04);
    }
    .testimonial-card p {
      font-style: italic;
      color: var(--primary-dark);
      margin-bottom: 20px;
      font-size: 15px;
    }
    .client-info {
      font-weight: bold;
      font-size: 14px;
      color: var(--accent-dark);
    }
    .client-edu {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    /* --- CONTACT FORM --- */
    #contact {
      background-color: var(--cream);
      padding: 80px 10%;
      text-align: center;
    }
    #contact h2 {
      font-size: 36px;
      font-family: 'Georgia', serif;
      margin-bottom: 10px;
    }
    #contact p {
      margin-bottom: 40px;
      color: var(--accent-dark);
    }
    form {
      max-width: 650px;
      margin: 0 auto;
      background: var(--white);
      padding: 45px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(22,37,6,0.06);
      text-align: left;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--primary-dark);
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--accent-light);
      border-radius: 4px;
      font-size: 15px;
      background: var(--white);
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent-dark);
    }
    .submit-btn {
      width: 100%;
      background-color: var(--accent-dark);
      color: var(--white);
      padding: 16px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .submit-btn:hover {
      background-color: var(--primary-dark);
    }
    
    /* --- FEEDBACK MESSAGES --- */
    #form-status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      font-weight: bold;
      display: none;
      text-align: center;
    }
    .status-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    /* --- FOOTER --- */
    footer {
      background-color: var(--primary-dark);
      color: var(--cream);
      padding: 40px 10%;
      text-align: center;
      font-size: 14px;
    }
    footer p {
      margin-bottom: 8px;
    }

    /* --- RESPONSIVE MOBILE FIX --- */
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        gap: 20px;
      }
      nav {
        flex-direction: column;
        gap: 15px;
      }
      header h1 {
        font-size: 32px;
      }
      .testimonial-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Paper Pancit</div>
